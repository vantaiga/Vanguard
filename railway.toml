[build]
builder = "nixpacks"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 99
startCommand = "node --max-old-space-size=350 --max-semi-space-size=64 --expose-gc --no-concurrent-sweeping src/index.js"

[[deploy.mounts]]
mountPath = "/data"
volumeId  = "your-volume-id"

[deploy.resources]
cpuLimit    = "0.5"
memoryLimit = "1GB"
